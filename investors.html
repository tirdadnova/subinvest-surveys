<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Subinvest — Investor Survey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0C1A;
  --surface:#14111F;
  --card:#1C1830;
  --border:#2D2850;
  --text:#F0EDE6;
  --muted:#8A86A8;
  --accent:#A78BFA;
  --accent-dim:#2D2558;
  --gold:#E8A94A;
  --gold-dim:#3A2A0A;
  --danger:#E05555;
  --r:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6}

.lang-bar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(14,12,26,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.brand{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent);letter-spacing:-.2px}
.lang-btns{display:flex;gap:6px}
.lb{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.lb.on{background:var(--accent);color:#0E0C1A;border-color:var(--accent);font-weight:600}

.prog{position:fixed;top:41px;left:0;right:0;z-index:199;height:3px;background:var(--border)}
.prog-fill{height:100%;background:var(--accent);transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

.slides{position:fixed;top:44px;left:0;right:0;bottom:56px;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px 20px;opacity:0;pointer-events:none;transform:translateY(40px);transition:all .45s cubic-bezier(.4,0,.2,1)}
.slide.active{opacity:1;pointer-events:all;transform:translateY(0)}
.slide.exit-up{opacity:0;transform:translateY(-40px)}

.slide-inner{width:100%;max-width:640px}
.q-num{font-size:12px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.q-num::after{content:'→';opacity:.5}
.q-title{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,32px);line-height:1.2;margin-bottom:8px;color:var(--text)}
.q-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.7}
.q-note{display:inline-block;font-size:12px;color:var(--gold);background:var(--gold-dim);padding:5px 12px;border-radius:6px;margin-bottom:18px}

.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--card);color:var(--text);font-size:14px}
.opt:hover{border-color:var(--accent);background:var(--accent-dim)}
.opt.sel{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.opt-key{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;transition:all .15s;background:var(--bg)}
.opt.sel .opt-key{background:var(--accent);color:#0E0C1A;border-color:var(--accent)}
.opt-text{flex:1;line-height:1.4}
.opt-desc{font-size:12px;color:var(--muted);margin-top:2px}
.opt.sel .opt-desc{color:rgba(167,139,250,.7)}
.multi-hint{font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}

.tf-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:20px;padding:10px 0;outline:none;transition:border .2s}
.tf-input:focus{border-bottom-color:var(--accent)}
.tf-input::placeholder{color:var(--muted)}
textarea.tf-input{resize:none;min-height:100px;border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:15px;background:var(--card)}
textarea.tf-input:focus{border-color:var(--accent)}

.scale-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.scale-btn{flex:1;min-width:40px;padding:12px 6px;border:1px solid var(--border);border-radius:8px;text-align:center;font-size:14px;cursor:pointer;background:var(--card);color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif}
.scale-btn:hover{border-color:var(--accent)}
.scale-btn.sel{background:var(--accent);color:#0E0C1A;border-color:var(--accent);font-weight:600}
.scale-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}

.ok-btn{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:12px 24px;background:var(--accent);color:#0E0C1A;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.ok-btn:hover{opacity:.85}
.ok-btn:disabled{opacity:.3;cursor:not-allowed}
.ok-hint{font-size:11px;color:var(--muted);margin-top:8px}

.welcome-slide{text-align:center}
.welcome-slide .q-title{font-size:clamp(28px,5vw,42px);margin-bottom:16px}
.welcome-slide .q-sub{max-width:500px;margin:0 auto 32px}
.stats{display:flex;justify-content:center;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-width:440px;margin:0 auto 32px}
.stat{flex:1;padding:16px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-v{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent)}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.start-btn{padding:14px 40px;background:var(--accent);color:#0E0C1A;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.start-btn:hover{opacity:.85}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(14,12,26,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
.nav-btns{display:flex;gap:8px}
.nav-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-counter{font-size:12px;color:var(--muted)}

.ty{text-align:center}
.ty-icon{font-size:56px;margin-bottom:16px}
.ty-title{font-family:'DM Serif Display',serif;font-size:32px;color:var(--accent);margin-bottom:10px}
.ty-sub{font-size:15px;color:var(--muted);max-width:440px;margin:0 auto 28px;line-height:1.8}
.share-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.share-btn{padding:10px 20px;border-radius:8px;font-size:13px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.req-err{font-size:12px;color:var(--danger);margin-top:8px;display:none}

@media(max-width:500px){.slide-inner{padding:0 4px}.q-title{font-size:22px}}
</style>
</head>
<body>

<div class="lang-bar">
  <div class="brand">Subinvest · Investor</div>
  <div class="lang-btns">
    <button class="lb" onclick="setLang('fr')">🇫🇷 FR</button>
    <button class="lb on" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
</div>
<div class="prog"><div class="prog-fill" id="pf"></div></div>
<div class="slides" id="slides"></div>
<div class="bottom-nav" id="bottomNav" style="display:none">
  <div class="nav-counter" id="navCounter"></div>
  <div class="nav-btns">
    <button class="nav-btn" id="btnUp" onclick="prevQ()">↑</button>
    <button class="nav-btn" id="btnDown" onclick="nextQ()">↓</button>
  </div>
</div>

<script>
let lang='en', current=0, answers={}, started=false;
function t(fr,en){return lang==='fr'?fr:en}

const questions=[
  {id:'welcome',type:'welcome'},

  // SECTION 1 — PROFILE
  {id:'q_inv_type',type:'radio',
    title:t('Quel type d\'investisseur êtes-vous ?','What type of investor are you?'),
    opts:[
      {v:'deal_club',l:t('Club de deals / Investment club','Deal club / Investment club'),desc:t('Groupe d\'investisseurs mutualisés','Group pooling deal access')},
      {v:'ba',l:t('Business angel individuel','Individual business angel')},
      {v:'family_office',l:'Family office'},
      {v:'vc',l:'Venture capital fund'},
      {v:'impact',l:t('Fonds impact / ESG','Impact / ESG fund')},
      {v:'other',l:t('Autre','Other')},
    ]
  },
  {id:'q_country',type:'text',
    title:t('Dans quel pays êtes-vous basé(e) ?','What country are you based in?'),
    placeholder:t('ex. France, Paris','e.g. France, Paris')
  },
  {id:'q_deals_done',type:'radio',
    title:t('Combien de deals avez-vous réalisés ces 2 dernières années ?','How many deals have you made in the last 2 years?'),
    opts:[
      {v:'0',l:t('Première année / aucun encore','First year / none yet')},
      {v:'1_3',l:'1 – 3'},
      {v:'4_10',l:'4 – 10'},
      {v:'gt10',l:t('Plus de 10','More than 10')},
    ]
  },
  {id:'q_invested_no_rev',type:'radio',
    title:t('Avez-vous déjà investi dans une startup sans revenus ?','Have you ever invested in a startup with no revenue yet?'),
    opts:[{v:'yes',l:t('Oui','Yes')},{v:'no',l:t('Non','No')}]
  },
  {id:'q_invested_first_time',type:'radio',
    title:t('Avez-vous déjà investi dans un fondateur à sa première startup ?','Have you ever invested in a first-time founder?'),
    opts:[{v:'yes',l:t('Oui','Yes')},{v:'no',l:t('Non','No')}]
  },

  // SECTION 2 — TICKET & CAPITAL
  {id:'q_ticket',type:'radio',
    title:t('Quel est votre ticket typique par deal ?','What is your typical ticket size per deal?'),
    opts:[
      {v:'lt1k',l:'< €1,000'},
      {v:'1_5k',l:'€1,000 – €5,000'},
      {v:'5_25k',l:'€5,000 – €25,000'},
      {v:'25_100k',l:'€25,000 – €100,000'},
      {v:'gt100k',l:'> €100,000'},
    ]
  },
  {id:'q_total_deploy',type:'radio',
    title:t('Quel capital total êtes-vous prêt(e) à déployer en 12 mois ?','How much total capital are you ready to deploy in 12 months?'),
    opts:[
      {v:'lt10k',l:'< €10,000'},
      {v:'10_50k',l:'€10,000 – €50,000'},
      {v:'50_250k',l:'€50,000 – €250,000'},
      {v:'250k_1m',l:'€250,000 – €1M'},
      {v:'gt1m',l:'> €1M'},
    ]
  },
  {id:'q_instruments',type:'multi',
    title:t('Quels instruments de financement préférez-vous ?','What financing instruments do you prefer?'),
    sub:t('Plusieurs choix possibles.','Multiple choice.'),
    opts:[
      {v:'equity',l:'Equity / Capital social'},
      {v:'rev_based',l:t('Revenue-based financing','Revenue-based financing'),desc:t('Remboursé via MRR — modèle Subinvest','Repaid via MRR — Subinvest model')},
      {v:'convertible',l:'Convertible note / BSA Air'},
      {v:'participatif',l:'Prêt participatif'},
      {v:'debt',l:t('Prêt classique','Classic debt')},
    ]
  },
  {id:'q_role',type:'radio',
    title:t('Quel est habituellement votre rôle dans un tour ?','What is usually your role in a round?'),
    opts:[
      {v:'lead',l:'Lead Investor'},
      {v:'co',l:'Co-Investor'},
      {v:'follower',l:'Follower Investor'},
      {v:'depends',l:t('Ça dépend du projet','Depends on the deal')},
    ]
  },

  // SECTION 3 — ROI & RETURNS
  {id:'q_irr',type:'radio',
    title:t('Quel IRR minimum attendez-vous sur des deals early-stage ?','What minimum IRR do you expect on early-stage deals?'),
    opts:[
      {v:'lt10',l:'< 10% / an',desc:t('Impact d\'abord, retour secondaire','Impact-first')},
      {v:'10_20',l:'10% – 20% / an'},
      {v:'20_40',l:'20% – 40% / an'},
      {v:'gt40',l:'> 40% / an (VC-style)'},
      {v:'flexible',l:t('Flexible selon le projet','Flexible — deal dependent')},
    ]
  },
  {id:'q_horizon',type:'radio',
    title:t('Quel horizon de sortie préférez-vous ?','What is your preferred exit horizon?'),
    opts:[
      {v:'lt1y',l:t('< 1 an (pré-financement court terme)','< 1 year (short-term bridge)')},
      {v:'1_3y',l:'1 – 3 ans / years'},
      {v:'3_5y',l:'3 – 5 ans / years'},
      {v:'gt5y',l:t('> 5 ans (equity long terme)','> 5 years (long-term equity)')},
    ]
  },
  {id:'q_decision_time',type:'radio',
    title:t('Combien de temps vous faut-il pour décider d\'investir ?','How long does it take you to decide to invest?'),
    opts:[
      {v:'lt1w',l:t('< 1 semaine','< 1 week')},
      {v:'1_4w',l:t('1 – 4 semaines','1 – 4 weeks')},
      {v:'1_3m',l:t('1 – 3 mois','1 – 3 months')},
      {v:'gt3m',l:t('> 3 mois','> 3 months')},
    ]
  },

  // SECTION 4 — THE SUBINVEST MODEL (KEY)
  {id:'q_leverage',type:'scale',
    title:t('⚡ Si votre capital de 5 000€ permet à une startup de débloquer 20 000€ de subvention BPI — cela change-t-il votre décision ?','⚡ If your €5,000 investment allows a startup to unlock a €20,000 BPI grant — does this change your decision?'),
    note:t('C\'est le cœur du modèle Subinvest — l\'effet de levier de l\'argent public.','This is the core of the Subinvest model — the leverage of public money.'),
    min:t('Aucun impact','No impact'),
    max:t('Décisif pour moi','Game changer')
  },
  {id:'q_crowdfund_co_invest',type:'radio',
    title:t('⚡ Seriez-vous prêt(e) à compléter un tour dont une partie est déjà financée par la communauté / crowdfunding ?','⚡ Would you complete a round where part of it is already funded by community subscriptions / crowdfunding?'),
    sub:t('Ex : 50 abonnés ont souscrit €10/mois → Subinvest convertit en €5 000 equity. Vous co-investissez pour atteindre le seuil BPI.','E.g. 50 subscribers at €10/month → Subinvest converts to €5,000 equity. You co-invest to reach the BPI threshold.'),
    opts:[
      {v:'yes_more',l:t('Oui — ça augmente ma confiance','Yes — it increases my confidence')},
      {v:'yes_neutral',l:t('Oui — ça ne change rien pour moi','Yes — no difference for me')},
      {v:'maybe',l:t('Peut-être — ça dépend du projet','Maybe — depends on the project')},
      {v:'no',l:t('Non — je préfère être seul investisseur','No — I prefer to be the sole investor')},
    ]
  },
  {id:'q_grant_unlock',type:'radio',
    title:t('⚡ Seriez-vous prêt(e) à financer un projet dont votre capital débloque une subvention ou aide d\'État plus grande ?','⚡ Would you invest in a project where your capital unlocks a larger government grant?'),
    note:t('C\'est la question fondamentale de Subinvest.','This is the fundamental Subinvest question.'),
    opts:[
      {v:'yes_key',l:t('Oui — c\'est même un critère positif fort','Yes — this is actually a strong positive signal')},
      {v:'yes_ok',l:t('Oui — ça ne me dérange pas','Yes — I don\'t mind')},
      {v:'neutral',l:t('Neutre — ça ne change rien','Neutral — makes no difference')},
      {v:'no',l:t('Non — je préfère des projets sans dépendance aux aides','No — I prefer projects without grant dependency')},
    ]
  },

  // SECTION 5 — FOUNDER PREFERENCES
  {id:'q_founder_criteria',type:'multi',
    title:t('Quelles qualités du fondateur comptent le plus pour vous ?','What founder qualities matter most to you?'),
    sub:t('Plusieurs choix possibles.','Multiple choice.'),
    opts:[
      {v:'professional',l:t('Expérience professionnelle','Professional background')},
      {v:'technical',l:t('Expertise technique','Technical expertise')},
      {v:'entrepreneur',l:t('Expérience entrepreneuriale','Entrepreneurial experience')},
      {v:'network',l:t('Réseau','Network')},
      {v:'community',l:t('Appartenance à une communauté','Community membership')},
      {v:'diversity',l:t('Diversité / inclusion','Diversity / inclusion')},
      {v:'impact',l:t('Impact social du projet','Social impact of project')},
    ]
  },
  {id:'q_diaspora',type:'radio',
    title:t('⚡ Êtes-vous ouvert(e) à investir dans des fondateurs issus de communautés diaspora ou minoritaires ?','⚡ Are you open to investing in founders from diaspora or minority communities?'),
    sub:t('Cela inclut toute communauté ethnique, culturelle, religieuse, ou identitaire — maghrébine, africaine, iranienne, asiatique, juive, musulmane, LGBT+, etc.','This includes any ethnic, cultural, religious or identity community — North African, African, Iranian, Asian, Jewish, Muslim, LGBT+, and any other minority group.'),
    opts:[
      {v:'priority',l:t('Oui — c\'est une priorité pour nous','Yes — it\'s a priority for us')},
      {v:'open',l:t('Oui — ouvert(e), sans préférence particulière','Yes — open, no specific preference')},
      {v:'neutral',l:t('Neutre — on évalue les projets pas les origines','Neutral — we evaluate projects, not founders\' origins')},
      {v:'no_pref',l:t('Préférence pour fondateurs locaux','Preference for local founders')},
    ]
  },
  {id:'q_diaspora_invested',type:'radio',
    title:t('Avez-vous déjà investi dans un fondateur immigrant ou issu d\'une minorité ?','Have you ever invested in an immigrant or minority founder?'),
    opts:[
      {v:'yes',l:t('Oui','Yes')},
      {v:'no',l:t('Non','No')},
      {v:'not_conscious',l:t('Probablement oui, sans en avoir conscience','Probably yes, without being aware of it')},
    ]
  },

  // SECTION 6 — TRACTION REQUIREMENTS
  {id:'q_min_traction',type:'radio',
    title:t('Quel signal de traction minimum vous faut-il avant d\'investir ?','What minimum traction signal do you need before investing?'),
    opts:[
      {v:'none',l:t('Aucun — idée suffisante avec bon fondateur','None — a good idea and founder is enough')},
      {v:'community',l:t('Abonnés / supporters (même sans revenus)','Subscribers / supporters (even without revenue)')},
      {v:'mrr',l:t('MRR existant (revenus récurrents)','Existing MRR (recurring revenue)')},
      {v:'grant',l:t('Subvention confirmée','Confirmed grant / subsidy')},
      {v:'customers',l:t('Clients payants','Paying customers')},
    ]
  },
  {id:'q_trust_signals',type:'multi',
    title:t('Quels labels augmentent votre confiance dans un projet ?','Which labels increase your confidence in a project?'),
    sub:t('Plusieurs choix possibles.','Multiple choice.'),
    opts:[
      {v:'french_tech',l:'French Tech'},
      {v:'bpi',l:'BPI France'},
      {v:'station_f',l:'Station F'},
      {v:'incubator',l:t('Incubateur / accélérateur','Incubator / accelerator')},
      {v:'state_grant',l:t('Subvention d\'État','State grant')},
      {v:'loi',l:'Letter of Intent (client)'},
      {v:'prev_investor',l:t('Investisseur précédent','Previous investor')},
    ]
  },
  {id:'q_tax',type:'radio',
    title:t('Les avantages fiscaux influencent-ils votre décision d\'investir ?','Do tax incentives influence your investment decision?'),
    opts:[
      {v:'very_much',l:t('Beaucoup — c\'est un critère clé','A lot — it\'s a key criterion')},
      {v:'somewhat',l:t('Un peu','Somewhat')},
      {v:'not_much',l:t('Peu','Not much')},
      {v:'no',l:t('Non — je ne les utilise pas','No — I don\'t use them')},
    ]
  },

  // SECTION 7 — IMPACT & SECTORS
  {id:'q_impact',type:'radio',
    title:t('L\'impact / ESG influence-t-il vos décisions d\'investissement ?','Does impact / ESG influence your investment decisions?'),
    opts:[
      {v:'primary',l:t('Oui — l\'impact est notre filtre principal','Yes — impact is our primary filter')},
      {v:'secondary',l:t('Oui — critère secondaire important','Yes — important secondary criterion')},
      {v:'bonus',l:t('C\'est un plus, pas une obligation','Nice to have, not required')},
      {v:'no',l:t('Non — focus purement financier','No — purely financial focus')},
    ]
  },
  {id:'q_sectors',type:'multi',
    title:t('Dans quels secteurs investissez-vous ?','Which sectors do you invest in?'),
    sub:t('Plusieurs choix possibles.','Multiple choice.'),
    opts:[
      {v:'saas',l:'SaaS / B2B Software'},
      {v:'ai',l:'AI / Deep tech'},
      {v:'fintech',l:'Fintech'},
      {v:'health',l:'Health / Medtech'},
      {v:'greentech',l:'Greentech / Cleantech'},
      {v:'food',l:'Food / Agriculture'},
      {v:'creative',l:t('Industrie créative / Médias','Creative / Media')},
      {v:'local',l:t('Commerce local / Services','Local business / Services')},
      {v:'all',l:t('Tous secteurs — généraliste','All sectors — generalist')},
    ]
  },
  {id:'q_geo',type:'radio',
    title:t('Quelle est votre zone géographique d\'investissement ?','What is your investment geography?'),
    opts:[
      {v:'local',l:t('Ville locale seulement','Local city only')},
      {v:'country',l:t('Pays de résidence seulement','Country of residence only')},
      {v:'eu',l:'Europe / EU'},
      {v:'global',l:t('International','International')},
    ]
  },

  // SECTION 8 — PLATFORM
  {id:'q_platform',type:'radio',
    title:t('⚡ Seriez-vous intéressé(e) par une plateforme qui vous donne accès à des projets pré-qualifiés avec subvention confirmée, MRR live et rapport financier automatique ?','⚡ Would you be interested in a platform giving you access to pre-qualified projects with confirmed grant, live MRR and auto financial report?'),
    opts:[
      {v:'yes_paid',l:t('Oui — je paierais pour cet accès','Yes — I would pay for this access')},
      {v:'yes_free',l:t('Oui — uniquement si gratuit','Yes — only if free')},
      {v:'maybe',l:t('Peut-être — ça dépend de la qualité','Maybe — depends on deal quality')},

// ── RENDER ──────────────────────────────────────────
function renderAll(){
  const container=document.getElementById('slides');
  container.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    div.id='slide_'+i;
    div.innerHTML=renderSlide(q,i);
    container.appendChild(div);
  });
  bindEvents();
  updateNav();
}

function renderSlide(q,i){
  if(q.type==='welcome') return renderWelcome();
  if(q.type==='thankyou') return renderThankyou();
  if(q.type==='contact') return renderContact(q,i);
  const vi=getVisibleIndex(i), tv=getTotalVisible();
  let html=`<div class="slide-inner"><div class="q-num">${vi} / ${tv}</div><div class="q-title">${q.title}</div>`;
  if(q.sub) html+=`<div class="q-sub">${q.sub}</div>`;
  if(q.note) html+=`<div class="q-note">${q.note}</div>`;
  const keys=['A','B','C','D','E','F','G','H','I'];
  if(q.type==='radio'){
    html+=`<div class="opts">`;
    q.opts.forEach((o,idx)=>{
      html+=`<div class="opt" data-qid="${q.id}" data-val="${o.v}" onclick="pickOpt('${q.id}','${o.v}',${i})">
        <div class="opt-key">${keys[idx]}</div>
        <div class="opt-text">${o.l}${o.desc?`<div class="opt-desc">${o.desc}</div>`:''}</div>
      </div>`;
    });
    html+=`</div><div class="req-err">Please select / Veuillez sélectionner.</div>`;
  }
  else if(q.type==='multi'){
    html+=`<div class="multi-hint">${t('Plusieurs choix — cliquez pour sélectionner','Multiple choice — click to select')}</div><div class="opts">`;
    q.opts.forEach((o,idx)=>{
      html+=`<div class="opt" data-qid="${q.id}" data-val="${o.v}" onclick="pickMulti('${q.id}','${o.v}',this)">
        <div class="opt-key">${keys[idx]}</div>
        <div class="opt-text">${o.l}</div>
      </div>`;
    });
    html+=`</div><button class="ok-btn" onclick="nextQ()">OK ↵</button>`;
  }
  else if(q.type==='text'){
    if(q.textarea){
      html+=`<textarea class="tf-input" id="inp_${q.id}" placeholder="${q.placeholder||''}" rows="4" oninput="answers['${q.id}']=this.value"></textarea>`;
    } else {
      html+=`<input class="tf-input" type="text" id="inp_${q.id}" placeholder="${q.placeholder||''}" oninput="answers['${q.id}']=this.value" onkeydown="if(event.key==='Enter')nextQ()"/>`;
    }
    html+=`<button class="ok-btn" onclick="nextQ()">OK ↵</button>`;
    if(!q.optional) html+=`<div class="req-err">Please fill in / Veuillez remplir.</div>`;
  }
  else if(q.type==='scale'){
    html+=`<div class="scale-row" id="scale_${q.id}">`;
    for(let n=1;n<=10;n++) html+=`<div class="scale-btn" onclick="pickScale('${q.id}',${n},${i})">${n}</div>`;
    html+=`</div><div class="scale-ends"><span>${q.min}</span><span>${q.max}</span></div>`;
    html+=`<div class="req-err">Please select / Veuillez sélectionner.</div>`;
  }
  html+=`</div>`;
  return html;
}

function getVisibleQuestions(){
  return questions.map((q,i)=>({q,i})).filter(({q})=>{
    if(q.type==='welcome'||q.type==='thankyou') return false;
    if(q.conditional){
      const dep=answers[q.conditional.id];
      const vals=Array.isArray(q.conditional.val)?q.conditional.val:[q.conditional.val];
      return vals.includes(dep);
    }
    return true;
  });
}
function getVisibleIndex(si){const v=getVisibleQuestions();const i=v.findIndex(x=>x.i===si);return i>=0?i+1:'—'}
function getTotalVisible(){return getVisibleQuestions().length}

function startSurvey(){started=true;document.getElementById('bottomNav').style.display='flex';goTo(1)}

function goTo(idx){
  const sl=document.querySelectorAll('.slide');
  sl[current].classList.remove('active');
  sl[current].classList.add('exit-up');
  setTimeout(()=>sl[current].classList.remove('exit-up'),450);
  current=idx;
  sl[current].classList.add('active');
  updateNav();updateProg();
  setTimeout(()=>{const inp=sl[current].querySelector('input,textarea');if(inp)inp.focus()},500);
}

function nextQ(){
  const q=questions[current];
  if(q.type==='radio'&&!answers[q.id]&&!q.optional){document.querySelector('#slide_'+current+' .req-err').style.display='block';return}
  if(q.type==='scale'&&!answers[q.id]){document.querySelector('#slide_'+current+' .req-err').style.display='block';return}
  if(q.type==='text'&&!q.optional){const v=document.getElementById('inp_'+q.id)?.value?.trim();if(!v){document.querySelector('#slide_'+current+' .req-err').style.display='block';return}}
  let next=current+1;
  while(next<questions.length-1){
    const nq=questions[next];
    if(nq.conditional){const dep=answers[nq.conditional.id];const vals=Array.isArray(nq.conditional.val)?nq.conditional.val:[nq.conditional.val];if(!vals.includes(dep)){next++;continue}}
    break;
  }
  if(next<questions.length) goTo(next);
}

function prevQ(){
  if(current<=1) return;
  let prev=current-1;
  while(prev>0){
    const pq=questions[prev];
    if(pq.conditional){const dep=answers[pq.conditional.id];const vals=Array.isArray(pq.conditional.val)?pq.conditional.val:[pq.conditional.val];if(!vals.includes(dep)){prev--;continue}}
    break;
  }
  if(prev>=0){const sl=document.querySelectorAll('.slide');sl[current].classList.remove('active');current=prev;sl[current].classList.add('active');updateNav();updateProg()}
}

function updateNav(){
  document.getElementById('btnUp').disabled=current<=1;
  document.getElementById('btnDown').disabled=current>=questions.length-1;
  const v=getVisibleQuestions();const i=v.findIndex(x=>x.i===current);
  document.getElementById('navCounter').textContent=i>=0?`${i+1} / ${v.length}`:'';
}
function updateProg(){
  const v=getVisibleQuestions();const i=v.findIndex(x=>x.i===current);
  document.getElementById('pf').style.width=(v.length>0&&i>=0?Math.round(((i+1)/v.length)*100):0)+'%';
}

function pickOpt(qid,val,si){
  answers[qid]=val;
  const slide=questions.findIndex(q=>q.id===qid);
  document.querySelectorAll('#slide_'+slide+' .opt[data-qid="'+qid+'"]').forEach(o=>o.classList.toggle('sel',o.dataset.val===val));
  const err=document.querySelector('#slide_'+slide+' .req-err');if(err)err.style.display='none';
  setTimeout(()=>nextQ(),300);
}
function pickMulti(qid,val,el){
  if(!answers[qid])answers[qid]=[];
  const i=answers[qid].indexOf(val);if(i>=0)answers[qid].splice(i,1);else answers[qid].push(val);
  el.classList.toggle('sel',answers[qid].includes(val));
}
function pickScale(qid,val,si){
  answers[qid]=val;
  document.querySelectorAll('#scale_'+qid+' .scale-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===val));
  const slide=questions.findIndex(q=>q.id===qid);
  const err=document.querySelector('#slide_'+slide+' .req-err');if(err)err.style.display='none';
  setTimeout(()=>nextQ(),350);
}

function bindEvents(){}

document.addEventListener('keydown',e=>{
  if(!started) return;
  const q=questions[current];
  if(e.key==='Enter'&&q.type!=='radio'&&q.type!=='scale') nextQ();
  if(e.key==='ArrowDown') nextQ();
  if(e.key==='ArrowUp') prevQ();
  if(q.type==='radio'||q.type==='multi'){
    const keys=['a','b','c','d','e','f','g','h','i'];
    const idx=keys.indexOf(e.key.toLowerCase());
    if(idx>=0&&q.opts&&q.opts[idx]){
      if(q.type==='radio') pickOpt(q.id,q.opts[idx].v,current);
      else{const el=document.querySelector('#slide_'+current+' .opt[data-val="'+q.opts[idx].v+'"]');if(el)pickMulti(q.id,q.opts[idx].v,el)}
    }
  }
});

  payload['⚡ Co-invest with crowdfunding?']=(answers.q_crowdfund_co_invest||'—');
  payload['⚡ Invest to unlock grant?']=(answers.q_grant_unlock||'—');
  payload['Founder criteria']=((answers.q_founder_criteria||[]).join(', ')||'—');
  payload['⚡ Open to diaspora/minority founders?']=(answers.q_diaspora||'—');
  payload['Invested in minority founder before?']=(answers.q_diaspora_invested||'—');
  payload['Min traction required']=(answers.q_min_traction||'—');
  payload['Trust signals']=((answers.q_trust_signals||[]).join(', ')||'—');
  payload['Tax incentives matter?']=(answers.q_tax||'—');
  payload['Impact / ESG']=(answers.q_impact||'—');
  payload['Sectors']=((answers.q_sectors||[]).join(', ')||'—');
  payload['Geography']=(answers.q_geo||'—');
  payload['⚡ Platform interest']=(answers.q_platform||'—');

  payload['Email']=(answers.c_email);

  payload['Call availability']=(answers.c_call||'—');

  payload['Submitted at']=(new Date().toLocaleString('en-GB',{timeZone:'Europe/Paris'}));
  try{
    const res=await fetch('https://formspree.io/f/xojzloal',{method:'POST',body:JSON.stringify(payload),headers:{'Accept':'application/json','Content-Type':'application/json'}});
    if(res.ok) goTo(questions.length-1);
    else throw new Error();
  }catch{btn.disabled=false;btn.textContent='⚠️ Error — retry'}
}

  lang=l;
  document.body.className='';
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().includes(l)));
  renderAll();
  if(started) document.getElementById('bottomNav').style.display='flex';
}
